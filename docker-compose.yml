services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: asa
      POSTGRES_PASSWORD: asa
      POSTGRES_DB: asa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asa"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://asa:asa@db:5432/asa}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEMO_MODE: ${DEMO_MODE:-false}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
